name: pro_link
description: Enterprise internship and skill tracking app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  uuid: ^4.5.1
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  table_calendar: ^3.1.3
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  shared_preferences: ^2.3.2
  pdf: ^3.11.1
  printing: ^5.13.4
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
